apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  labels:
    app: portfolio
  annotations:
    # Keel bu image'ı periyodik olarak kontrol eder; ":latest" tag'inin
    # digest'i değiştiğinde (yeni push) deployment'ı otomatik günceller.
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: ghcr.io/cagatayuresin/portfolio:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      # GHCR private ise bu secret'ı oluştur:
      # kubectl create secret docker-registry ghcr-secret \
      #   --docker-server=ghcr.io --docker-username=cagatayuresin \
      #   --docker-password=<GITHUB_PAT>
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
spec:
  selector:
    app: portfolio
  ports:
    - port: 80
      targetPort: 80
