apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio
  annotations:
    # cert-manager'daki ClusterIssuer adınla değiştir (örn: letsencrypt-prod)
    cert-manager.io/cluster-issuer: <cluster-issuer-adın>
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - astro.cagatayuresin.com
      secretName: portfolio-tls
  rules:
    - host: astro.cagatayuresin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio
                port:
                  number: 80
