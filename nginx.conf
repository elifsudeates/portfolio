server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro statik sayfaları: önce dosya, yoksa .html uzantısıyla dene
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Statik varlıkları uzun süre cache'le
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
