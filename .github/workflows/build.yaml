name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so new GitHub repos show up even without a push
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GITHUB_TOKEN'ı build-arg olarak geç: repolar API'den sorunsuz çekilsin
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/cagatayuresin/portfolio:latest
            ghcr.io/cagatayuresin/portfolio:${{ github.sha }}
